name: Build Android APK

on:
  workflow_dispatch:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Stage Python sources for Chaquopy
        run: |
          python tools/gen_page_data.py
          python tools/gen_starter.py
          dest=android/app/src/main/python
          mkdir -p "$dest"
          cp app.py cw_config.py cw_http.py cw_congress.py cw_institutions.py \
             cw_members.py cw_meta.py cw_news.py cw_prices.py version.py \
             page_data.py starter_data.py "$dest"/
          ls -la "$dest"

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Build debug APK
        working-directory: android
        run: gradle assembleDebug --stacktrace --no-daemon

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk CongressWhales.apk

      - uses: actions/upload-artifact@v4
        with:
          name: CongressWhales-apk
          path: CongressWhales.apk

      - name: Attach APK to release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" "CongressWhales.apk#Congress Whales (Android).apk" --clobber
