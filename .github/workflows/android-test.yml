name: Test Android APK (emulator)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Stage Python sources
        run: |
          python tools/gen_page_data.py
          dest=android/app/src/main/python
          mkdir -p "$dest"
          cp app.py cw_config.py cw_http.py cw_congress.py cw_institutions.py \
             cw_members.py cw_meta.py cw_news.py cw_prices.py version.py page_data.py "$dest"/

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Build APK
        working-directory: android
        run: gradle assembleDebug --no-daemon

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run in emulator + capture logs
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          arch: x86_64
          profile: pixel_5
          disable-animations: true
          script: |
            adb install -r android/app/build/outputs/apk/debug/app-debug.apk
            adb logcat -c
            adb shell am start -n com.congresswhales/.MainActivity
            sleep 100
            adb exec-out screencap -p > screen.png || true
            adb logcat -d > logcat_full.txt || true
            adb logcat -d "python.stdout:V" "python.stderr:V" "chaquopy:V" "AndroidRuntime:E" "System.err:V" "*:S" > logcat_python.txt || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: android-test
          path: |
            screen.png
            logcat_full.txt
            logcat_python.txt
